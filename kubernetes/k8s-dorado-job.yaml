apiVersion: batch/v1
kind: Job
metadata:
  generateName: dorado-fast-run-
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-L4
      containers:
      - name: dorado-worker
        image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-devel
        command:
        - /bin/bash
        - -c
        - |
          # The PyTorch image does not have git by default, so we install it first!
          apt-get update && apt-get install -y git
          
          # Use the persistent volume for caching
          export HF_HOME="/data/.cache/huggingface"
          
          # Clone the repository dynamically (make sure you pushed your changes!)
          cd /data
          if [ -d "llmpt" ]; then
            cd llmpt
            git pull
          else
            # REPLACE THIS URL WITH YOUR ACTUAL GITHUB REPO URL!
            git clone -b main https://github.com/vedant2100/llmpt.git
            cd llmpt
          fi
          
          # Setup environment and run!
          bash setup.sh
          
          # 🔴 CRITICAL CLUSTER FIX: NRP Nautilus virtualization layer blocks native GPU PCI P2P!
          # If PyTorch attempts a native PCIe gradient synchronization, it silently deadlocks 100% of the time.
          # We explicitly force NCCL to route through system RAM and verbosely log itself to stop the freeze.
          export NCCL_P2P_DISABLE=1
          export NCCL_IB_DISABLE=1
          export NCCL_DEBUG=INFO

          echo "🚀 Starting Python Execution (multi-GPU DDP mode)..."
          mkdir -p /data/llmpt/results
          python main.py --profile fast 2>&1 | tee /data/llmpt/results/k8s_run.log
        volumeMounts:
        - mountPath: /data
          name: dorado-datavol
        resources:
          limits:
            memory: 64Gi
            cpu: "16"
            nvidia.com/gpu: 4
          requests:
            memory: 64Gi
            cpu: "16"
            nvidia.com/gpu: 4
      volumes:
      - name: dorado-datavol
        persistentVolumeClaim:
          claimName: dorado-datavol
      restartPolicy: Never
  backoffLimit: 0
